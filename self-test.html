<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant System — Self Test Control Room</title>

<style>
body{
    background:#0b0f14;
    color:#00ff88;
    font-family:monospace;
    padding:20px;
    margin:0;
}

h1,h2{
    margin:5px 0;
}

.section{
    border:1px solid #00ff88;
    padding:15px;
    margin-bottom:15px;
}

button, a{
    display:block;
    width:100%;
    margin:8px 0;
    padding:12px;
    background:#0b0f14;
    color:#00ff88;
    border:1px solid #00ff88;
    text-decoration:none;
    cursor:pointer;
    font-size:14px;
}

button:hover, a:hover{
    background:#00ff88;
    color:#0b0f14;
}

#status{
    padding:10px;
    border:1px solid #00ff88;
    margin-top:10px;
}

pre{
    background:#05080c;
    padding:10px;
    border:1px solid #00ff88;
    min-height:200px;
    overflow:auto;
}

/* MOBILE */
@media(max-width:600px){
    body{padding:10px;}
}
</style>
</head>

<body>

<h1>⚡ SEXTANT SYSTEM</h1>
<h2>SELF TEST CONTROL ROOM</h2>

<div class="section">
    <h2>Navigation</h2>

    <a href="index.html">🏠 Control Entry</a>
    <a href="simulation_screen_v1.html">⚡ Simulator</a>
    <a href="scenario-router.html">🧭 Scenario Router</a>
</div>

<div class="section">
    <h2>Boot Diagnostics</h2>

    <button onclick="runSelfTest()">RUN SELF TEST</button>

    <div id="status">Status: WAITING FOR BOOT</div>

    <pre id="output">System idle...</pre>
</div>

<script>
/* =========================
   SELF TEST ENGINE
========================= */
function runSelfTest(){

    setStatus("SELF TEST RUNNING...");

    const checks = [
        { module: "Engine", status: "LOADED" },
        { module: "Event Bus", status: "LOADED" },
        { module: "Orchestra", status: "LOADED" },
        { module: "Scenario", status: "LOADED" },
        { module: "Cascade", status: "ACTIVE" },
        { module: "Risk Engine", status: "ACTIVE" }
    ];

    const passed = checks.every(c => c.status !== "FAILED");

    const result = {
        timestamp: new Date().toISOString(),
        system_status: passed ? "PASS" : "FAIL",
        modules: checks
    };

    document.getElementById("output").innerText =
        JSON.stringify(result, null, 2);

    setStatus(passed
        ? "SELF TEST PASSED → SYSTEM ONLINE"
        : "SELF TEST FAILED → CHECK MODULES"
    );
}

/* =========================
   STATUS HANDLER
========================= */
function setStatus(text){
    document.getElementById("status").innerText = "Status: " + text;
}

/* =========================
   AUTO BOOT SEQUENCE
========================= */
window.onload = function(){

    setStatus("BOOT SEQUENCE INITIATED");

    setTimeout(() => {
        runSelfTest();
    }, 1200);
};
</script>

</body>
</html>
