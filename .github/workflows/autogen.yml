name: Sextant Event-Driven Evolution

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Evolution Engine
        run: python gitmore.py

      - name: Commit Evolution Output
        run: |
          git config user.name "sextant-bot"
          git config user.email "sextant-bot@users.noreply.github.com"

          git add .

          git commit -m "event-driven evolution update" || exit 0

          git push
