name: Sextant Event-Driven Evolution

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Evolution Engine
        run: python gitmore.py

      - name: Commit Evolution Output
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "event-driven evolution update" || echo "no changes"
          git push
