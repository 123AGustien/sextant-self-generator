<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sextant Control Room</title>

<style>
body {
  margin: 0;
  background: #0a0f14;
  color: #d6e2f0;
  font-family: monospace;
}

header {
  padding: 20px;
  border-bottom: 1px solid #222;
  text-align: center;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 20px;
}

.panel {
  border: 1px solid #222;
  padding: 20px;
  background: #0d141b;
  text-align: center;
}

h2 {
  color: #8fbcd4;
}

p {
  opacity: 0.8;
  font-size: 13px;
}

button {
  padding: 14px;
  margin-top: 10px;
  width: 100%;
  background: #0a0f14;
  color: #00ff88;
  border: 1px solid #00ff88;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  background: #00ff88;
  color: #0a0f14;
}

.status {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 10px;
}

.footer {
  text-align: center;
  padding: 10px;
  font-size: 11px;
  opacity: 0.5;
}
</style>
</head>

<body>

<header>
  <h1>Sextant Control Room</h1>
  <div class="status">Router Layer Only — No Simulation Logic</div>
</header>

<div class="container">

  <!-- SIMULATION ENGINE -->
  <div class="panel">
    <h2>Simulation Engine</h2>
    <p>Datacentre infrastructure cascade model</p>

    <button onclick="openSimulation()">Open Simulation Screen</button>

    <div class="status">
      simulation_screen.html
    </div>
  </div>

  <!-- AI TOOL -->
  <div class="panel">
    <h2>Cascade AI Tool</h2>
    <p>Event-driven reasoning & scenario analysis</p>

    <button onclick="openAI()">Open AI Screen</button>

    <div class="status">
      cascade_screen.html
    </div>
  </div>

</div>

<div class="footer">
  Control Room Router — GitHub Pages Safe Navigation Layer
</div>

<script>
/* =========================
   ROUTER ONLY (NO ENGINE LOGIC)
========================= */

function openSimulation() {
  window.location.href = "./simulation_screen.html";
}

function openAI() {
  window.location.href = "./cascade_screen.html";
}
</script>

</body>
</html>
