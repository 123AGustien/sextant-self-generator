<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Sextant True Scenario Engine</title>

<style>
    body {
        background: #0b0f14;
        color: #00ff88;
        font-family: monospace;
        padding: 20px;
    }

    h1 { margin-bottom: 10px; }

    .panel {
        border: 1px solid #00ff88;
        padding: 12px;
        margin-bottom: 12px;
    }

    button {
        background: #0b0f14;
        color: #00ff88;
        border: 1px solid #00ff88;
        padding: 10px;
        margin: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #00ff88;
        color: #0b0f14;
    }

    pre {
        background: #05080c;
        padding: 12px;
        min-height: 180px;
        overflow: auto;
        border: 1px solid #00ff88;
    }
</style>
</head>

<body>

<h1>⚡ Sextant True Scenario Engine (Complete Build)</h1>

<div class="panel">
    <button onclick="runScenario('trade')">US–China Trade Escalation</button>
    <button onclick="runScenario('taiwan')">Taiwan Strait Crisis</button>
    <button onclick="runScenario('energy')">Energy Market Shock</button>
    <button onclick="runScenario('recession')">Global Recession</button>
</div>

<div class="panel">
    <div>EXECUTION OUTPUT</div>
    <pre id="output">Awaiting execution...</pre>
</div>

<div class="panel">
    <div>RISK DASHBOARD</div>
    <pre id="risk">--</pre>
</div>

<script>
console.log("Sextant True Scenario Engine Loaded");

// =====================
// SYSTEM SCENARIOS
// =====================
const scenarios = {
    trade: {
        name: "US–China Trade Escalation",
        risk: "HIGH",
        effects: {
            supply_chain: -70,
            currency: -50,
            exports: -80,
            inflation: +40
        },
        narrative: "Export collapse + currency shock detected"
    },

    taiwan: {
        name: "Taiwan Strait Crisis",
        risk: "CRITICAL",
        effects: {
            semiconductors: -90,
            tech_supply: -85,
            markets: -60,
            volatility: +80
        },
        narrative: "Semiconductor breakdown + global tech shock"
    },

    energy: {
        name: "Energy Market Shock",
        risk: "HIGH",
        effects: {
            oil_supply: -75,
            inflation: +70,
            logistics: -60,
            markets: -55
        },
        narrative: "Energy disruption + inflation spike"
    },

    recession: {
        name: "Global Recession",
        risk: "HIGH",
        effects: {
            gdp: -80,
            banking: -85,
            liquidity: -70,
            unemployment: +60
        },
        narrative: "Banking liquidity failure + economic contraction"
    }
};

// =====================
// CORE RUNNER
// =====================
function runScenario(type) {

    const output = document.getElementById("output");
    const risk = document.getElementById("risk");

    const scenario = scenarios[type];

    if (!scenario) {
        output.textContent = "Unknown scenario";
        risk.textContent = "Risk Index: MEDIUM";
        return;
    }

    // simulate derived metrics
    const resilienceIndex =
        (100 -
        Math.abs(Object.values(scenario.effects)
            .reduce((a, b) => a + Math.abs(b), 0) / 4)).toFixed(2);

    const simulation = {
        scenario: scenario.name,
        narrative: scenario.narrative,
        system_effects: scenario.effects,
        resilience_index: resilienceIndex,
        timestamp: new Date().toISOString()
    };

    output.textContent = JSON.stringify(simulation, null, 2);
    risk.textContent =
        "Risk Index: " + scenario.risk +
        " | Resilience: " + resilienceIndex;
}

// =====================
// INITIAL STATE
// =====================
runScenario("trade");
</script>

</body>
</html>
