<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Command Center v10</title>

<style>
body{
    margin:0;
    background:#0a0f14;
    color:#d6e2f0;
    font-family:monospace;
}

.panel{
    border:1px solid #222;
    padding:10px;
    margin:10px;
    background:#0d141b;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
}

h2{
    font-size:14px;
    color:#8fbcd4;
    margin:0 0 10px 0;
}

input{
    width:100%;
    padding:10px;
    background:#0a0f14;
    color:#d6e2f0;
    border:1px solid #333;
}

button{
    margin-top:10px;
    padding:10px;
    background:#0a0f14;
    color:#00ff88;
    border:1px solid #00ff88;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- INPUT LAYER -->
<div class="panel">
    <h2>SCENARIO INPUT</h2>
    <input id="scenarioInput" placeholder="Type scenario (FX stress, banking crisis, liquidity shock)">
    <button onclick="runTypedScenario()">RUN</button>
</div>

<div class="grid">

    <div class="panel">
        <h2>CASCADE ENGINE</h2>
        <div id="output">Idle</div>
    </div>

    <div class="panel">
        <h2>RISK ENGINE</h2>
        <div id="risk">0</div>
    </div>

    <div class="panel">
        <h2>TIMELINE</h2>
        <div id="timeline"></div>
    </div>

    <div class="panel">
        <h2>SYSTEM STATE</h2>
        <div id="log">Waiting...</div>
    </div>

    <div class="panel" style="grid-column:span 2;">
        <h2>EXPLANATION LAYER</h2>
        <div id="explanationPanel">Waiting for scenario...</div>
    </div>

</div>

<script>
/* =========================
   EXPLANATION ENGINE
========================= */
function explainCascade(cascade) {

    const path = cascade.path || "unknown";
    const stress = cascade.stress || 0;

    let severity = "low";
    if (stress > 0.8) severity = "critical";
    else if (stress > 0.6) severity = "high";
    else if (stress > 0.4) severity = "moderate";

    let driver = "multi-factor stress";
    if (path.includes("FX")) driver = "currency instability";
    if (path.includes("bank")) driver = "banking system stress";
    if (path.includes("liquidity")) driver = "liquidity contraction";

    return {
        interpretation:
`CASCADE ANALYSIS
Primary Path: ${path}
Primary Driver: ${driver}
Severity: ${severity}

SYSTEM INTERPRETATION:
The system is experiencing ${driver}.
Stress propagation indicates a ${severity} regime.
Intervention should focus on stabilising the primary driver.`
    };
}

/* =========================
   MAIN WIRING
========================= */
function runTypedScenario() {

    const input = document.getElementById("scenarioInput").value;

    const state = {
        FX: input.toLowerCase().includes("fx") ? 0.85 : 0.3,
        BANK: input.toLowerCase().includes("bank") ? 0.8 : 0.4,
        LIQ: input.toLowerCase().includes("liquidity") ? 0.9 : 0.35,
        EQ: input.toLowerCase().includes("market") ? 0.7 : 0.4,
        CONF: input.toLowerCase().includes("panic") ? 0.9 : 0.5
    };

    const result = explainCascade({
        path: input,
        stress: Math.max(state.FX, state.BANK, state.LIQ)
    });

    document.getElementById("output").innerText =
        "RUNNING → " + input;

    document.getElementById("risk").innerText =
        "SYSTEM ACTIVE";

    document.getElementById("timeline").innerText =
        "Cascade generated from scenario input";

    document.getElementById("log").innerText =
        result.interpretation;

    document.getElementById("explanationPanel").innerText =
        result.interpretation;
}
</script>

</body>
</html>
