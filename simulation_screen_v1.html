<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Simulator v6.2 – Phase 4.5 Wired</title>

<style>
body {
    margin: 0;
    background: #0a0f14;
    color: #d6e2f0;
    font-family: monospace;
}

/* MOBILE SAFE GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
}

/* MOBILE STACK */
@media (max-width: 600px) {
    .grid {
        grid-template-columns: 1fr;
    }
}

.panel {
    border: 1px solid #222;
    padding: 10px;
    background: #0d141b;
}

h2 {
    font-size: 14px;
    color: #8fbcd4;
}

button {
    padding: 12px;
    margin: 5px;
    background: #0a0f14;
    color: #00ff88;
    border: 1px solid #00ff88;
    cursor: pointer;
    width: 48%;
}

button:hover {
    background: #00ff88;
    color: #0a0f14;
}

@media (max-width:600px){
    button{ width:100%; }
}
</style>
</head>

<body>

<!-- CONTROL BAR -->
<div style="padding:10px; display:flex; flex-wrap:wrap; gap:10px; justify-content:center;">
    <button onclick="runTypedScenario()">RUN SCENARIO</button>
    <button onclick="runSelfTest()">RUN SELF TEST</button>
</div>

<!-- DASHBOARD -->
<div class="grid">

    <div class="panel">
        <h2>CASCADE ENGINE</h2>
        <div id="output">Idle</div>
    </div>

    <div class="panel">
        <h2>RISK ENGINE</h2>
        <div id="risk">0</div>
    </div>

    <div class="panel">
        <h2>TIMELINE</h2>
        <div id="timeline">Waiting...</div>
    </div>

    <div class="panel">
        <h2>SYSTEM STATE</h2>
        <div id="log">Ready</div>
    </div>

    <div class="panel" style="grid-column: span 2;">
        <h2>EXPLANATION LAYER</h2>
        <div id="explanationPanel">Waiting...</div>
    </div>

</div>

<script type="module">

/* =========================
   EVENT BUS
========================= */
const EventBus = {
    listeners: {},
    on(e, fn){ (this.listeners[e] ||= []).push(fn); },
    emit(e, d){ (this.listeners[e]||[]).forEach(f=>f(d)); }
};

/* =========================
   CASCADE ENGINE
========================= */
function createCascade(input){
    const t = (input || "").toLowerCase();
    const nodes = [];

    if(t.includes("fx")) nodes.push({type:"FX_SHOCK", impact:0.85});
    if(t.includes("liquidity")) nodes.push({type:"LIQUIDITY_STRESS", impact:0.9});
    if(t.includes("bank")) nodes.push({type:"BANKING_STRESS", impact:0.8});

    nodes.push({type:"CONFIDENCE_LOSS", impact:0.6});
    EventBus.emit("NODE", nodes.at(-1));

    EventBus.emit("CASCADE_COMPLETE", nodes);
    return nodes;
}

/* =========================
   RISK ENGINE
========================= */
function calculateRisk(nodes){
    const score = Math.min(
        (nodes.reduce((a,n)=>a+n.impact,0)/nodes.length)*100,
        100
    );

    const level =
        score>80?"CRITICAL":
        score>60?"HIGH":
        score>40?"MODERATE":"LOW";

    const res = {score:Math.round(score),level};
    EventBus.emit("RISK",res);
    return res;
}

/* =========================
   EXPLANATION ENGINE
========================= */
function explain(nodes){
    const drivers = nodes.map(n=>{
        if(n.type==="FX_SHOCK") return "currency instability";
        if(n.type==="LIQUIDITY_STRESS") return "liquidity contraction";
        if(n.type==="BANKING_STRESS") return "banking stress";
        return "confidence erosion";
    });

    const max = Math.max(...nodes.map(n=>n.impact));

    const severity =
        max>0.8?"critical":
        max>0.6?"high":
        max>0.4?"moderate":"low";

    const out =
`CASCADE ANALYSIS
Drivers: ${drivers.join(" → ")}
Severity: ${severity}`;

    EventBus.emit("EXPLANATION",out);
    return out;
}

/* =========================
   ORCHESTRATOR
========================= */
function runScenario(input){
    EventBus.emit("SYSTEM","RUNNING");

    const nodes = createCascade(input);
    const risk = calculateRisk(nodes);
    const explanation = explain(nodes);

    EventBus.emit("STATE",{nodes,risk,explanation});
}

/* =========================
   SELF TEST
========================= */
function runSelfTest(){

    EventBus.emit("SYSTEM","SELF TEST RUNNING");

    document.getElementById("output").innerText = "SELF TEST STARTING...";
    document.getElementById("risk").innerText = "0";
    document.getElementById("timeline").innerText = "BOOT TRACE...";

    const nodes = createCascade("fx liquidity bank panic");
    const risk = calculateRisk(nodes);
    const explanation = explain(nodes);

    const passed = nodes.length>0 && risk.score>0;

    EventBus.emit("SELF_TEST",{passed,nodes,risk});
    EventBus.emit("SYSTEM",passed?"SELF TEST PASSED":"SELF TEST FAILED");
}

/* =========================
   UI BINDINGS
========================= */
window.runTypedScenario = ()=>{
    const input = prompt("Enter scenario (fx, liquidity, bank, panic)");
    runScenario(input);
};

window.runSelfTest = runSelfTest;

/* =========================
   UI EVENTS
========================= */
EventBus.on("NODE",n=>{
    document.getElementById("output").innerText += "\n→ "+n.type;
});

EventBus.on("RISK",r=>{
    document.getElementById("risk").innerText = `${r.score} (${r.level})`;
});

EventBus.on("SYSTEM",s=>{
    document.getElementById("log").innerText = s;
});

EventBus.on("EXPLANATION",t=>{
    document.getElementById("explanationPanel").innerText = t;
});

EventBus.on("STATE",s=>{
    document.getElementById("timeline").innerText =
        "NODES: "+s.nodes.length;
});

EventBus.on("SELF_TEST",r=>{
    document.getElementById("output").innerText +=
        "\n" + (r.passed
        ? "🟢 SELF TEST PASSED"
        : "🔴 SELF TEST FAILED");
});

/* =========================
   BOOT SEQUENCE (AUTO RUN)
========================= */
function bootSequence(){

    EventBus.emit("SYSTEM","BOOT SEQUENCE INITIATED");

    setTimeout(()=>{
        runSelfTest();
    },600);

    setTimeout(()=>{
        EventBus.emit("SYSTEM","SYSTEM ONLINE");
    },2000);
}

window.addEventListener("load", bootSequence);

</script>

</body>
</html>
