<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Cascade Screen v1</title>

<style>
body {
    margin: 0;
    background: #0a0f14;
    color: #d6e2f0;
    font-family: monospace;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
}

@media (max-width: 600px) {
    .grid {
        grid-template-columns: 1fr;
    }
}

.panel {
    border: 1px solid #222;
    padding: 10px;
    background: #0d141b;
}

h2 {
    font-size: 14px;
    color: #8fbcd4;
}

button {
    padding: 12px;
    margin: 5px;
    background: #0a0f14;
    color: #00ff88;
    border: 1px solid #00ff88;
    cursor: pointer;
    width: 48%;
}

button:hover {
    background: #00ff88;
    color: #0a0f14;
}

@media (max-width:600px){
    button{ width:100%; }
}
</style>
</head>

<body>

<!-- CONTROL BAR -->
<div style="padding:10px; display:flex; flex-wrap:wrap; gap:10px; justify-content:center;">
    <button onclick="runTypedScenario()">RUN SCENARIO</button>
    <button onclick="runSelfTest()">RUN SELF TEST</button>
</div>

<!-- DASHBOARD -->
<div class="grid">

    <div class="panel">
        <h2>CASCADE ENGINE</h2>
        <div id="output">Idle</div>
    </div>

    <div class="panel">
        <h2>RISK ENGINE</h2>
        <div id="risk">0</div>
    </div>

    <div class="panel">
        <h2>TIMELINE</h2>
        <div id="timeline">Waiting...</div>
    </div>

    <div class="panel">
        <h2>SYSTEM STATE</h2>
        <div id="log">Ready</div>
    </div>

    <div class="panel" style="grid-column: span 2;">
        <h2>EXPLANATION LAYER</h2>
        <div id="explanationPanel">Waiting...</div>
    </div>

</div>

<script>
/* =========================
   CASCADE EVENT ENGINE
========================= */

function createCascade(input){
    const t = (input || "").toLowerCase();
    const nodes = [];

    if(t.includes("fx")) nodes.push({type:"FX_SHOCK", impact:0.85});
    if(t.includes("liquidity")) nodes.push({type:"LIQUIDITY_STRESS", impact:0.9});
    if(t.includes("bank")) nodes.push({type:"BANKING_STRESS", impact:0.8});
    if(t.includes("panic")) nodes.push({type:"SYSTEM_PANIC", impact:0.95});

    nodes.push({type:"CONFIDENCE_LOSS", impact:0.6});

    return nodes;
}

/* =========================
   RISK ENGINE
========================= */

function calculateRisk(nodes){
    const score = Math.min(
        (nodes.reduce((a,n)=>a+n.impact,0)/nodes.length)*100,
        100
    );

    const level =
        score>80?"CRITICAL":
        score>60?"HIGH":
        score>40?"MODERATE":"LOW";

    return {score:Math.round(score), level};
}

/* =========================
   EXPLANATION ENGINE
========================= */

function explain(nodes){
    const drivers = nodes.map(n=>{
        switch(n.type){
            case "FX_SHOCK": return "currency instability";
            case "LIQUIDITY_STRESS": return "liquidity contraction";
            case "BANKING_STRESS": return "banking stress";
            case "SYSTEM_PANIC": return "system panic event";
            default: return "confidence erosion";
        }
    });

    const max = Math.max(...nodes.map(n=>n.impact));

    const severity =
        max>0.8?"critical":
        max>0.6?"high":
        max>0.4?"moderate":"low";

    return `CASCADE ANALYSIS
Drivers: ${drivers.join(" → ")}
Severity: ${severity}`;
}

/* =========================
   ORCHESTRATOR
========================= */

function runScenario(input){

    const nodes = createCascade(input);
    const risk = calculateRisk(nodes);
    const explanation = explain(nodes);

    document.getElementById("output").innerText =
        nodes.map(n=>"→ "+n.type).join("\n");

    document.getElementById("risk").innerText =
        `${risk.score} (${risk.level})`;

    document.getElementById("timeline").innerText =
        "NODES: " + nodes.length;

    document.getElementById("log").innerText =
        "RUNNING: " + input;

    document.getElementById("explanationPanel").innerText =
        explanation;
}

/* =========================
   SELF TEST
========================= */

function runSelfTest(){

    const nodes = createCascade("fx liquidity bank panic");
    const risk = calculateRisk(nodes);
    const explanation = explain(nodes);

    document.getElementById("output").innerText =
        "SELF TEST\n" + nodes.map(n=>"→ "+n.type).join("\n");

    document.getElementById("risk").innerText =
        `${risk.score} (${risk.level})`;

    document.getElementById("timeline").innerText =
        "NODES: " + nodes.length;

    document.getElementById("log").innerText =
        "SELF TEST RUN";

    document.getElementById("explanationPanel").innerText =
        explanation;
}

/* =========================
   UI HOOKS
========================= */

window.runTypedScenario = ()=>{
    const input = prompt("Enter scenario (fx, liquidity, bank, panic)");
    runScenario(input);
};

window.runSelfTest = runSelfTest;

/* =========================
   BOOT
========================= */

window.addEventListener("load", ()=>{
    document.getElementById("log").innerText = "SYSTEM READY";
});
</script>

</body>
</html>
