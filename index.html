<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Schneider Datacentre Pilot — Simulator</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<header>
  <h1>Schneider Datacentre Pilot</h1>
  <h2>Isolated Resilience Simulation Environment (DO NOT MERGE)</h2>
</header>

<div class="container">

  <!-- CONTROLS PANEL -->
  <div class="panel">
    <h3>Simulation Controls</h3>

    <button onclick="runScenario('cooling')">Trigger Cooling Failure</button>
    <button onclick="runScenario('power')">Trigger Power Instability</button>
    <button onclick="runScenario('network')">Trigger Network Congestion</button>
    <button onclick="runScenario('normal')">Run Normal Operation</button>

    <hr style="border:1px solid #1f2a37; margin:15px 0;" />

    <!-- METRICS DASHBOARD -->
    <div class="metric"><span>Cooling</span><span id="cooling">1.00</span></div>
    <div class="metric"><span>Power</span><span id="power">1.00</span></div>
    <div class="metric"><span>Network</span><span id="network">1.00</span></div>
    <div class="metric"><span>Compute</span><span id="compute">1.00</span></div>
    <div class="metric"><span>Risk</span><span id="risk">0.00</span></div>
  </div>

  <!-- OUTPUT PANEL -->
  <div class="panel">
    <h3>Simulation Output</h3>
    <div id="output"></div>
  </div>

</div>

<script src="simulator.js"></script>

<script>
/* =========================
   UI BINDING LAYER
   ========================= */

const outputDiv = document.getElementById("output");

/* Console → UI stream */
function logToUI(msg) {
  const line = document.createElement("div");
  line.textContent = msg;
  outputDiv.appendChild(line);
  outputDiv.scrollTop = outputDiv.scrollHeight;
}

/* preserve original console */
const originalLog = console.log;
console.log = function (...args) {
  originalLog(...args);
  logToUI(args.join(" "));
};

/* Dashboard refresh */
function refreshDashboard() {
  document.getElementById("cooling").textContent = systemState.cooling.toFixed(2);
  document.getElementById("power").textContent = systemState.power.toFixed(2);
  document.getElementById("network").textContent = systemState.network.toFixed(2);
  document.getElementById("compute").textContent = systemState.compute.toFixed(2);
  document.getElementById("risk").textContent = systemState.overallRisk;
}

/* Hook simulator metric updates */
const originalUpdateMetrics = updateMetrics;

updateMetrics = function () {
  originalUpdateMetrics();
  refreshDashboard();
};

/* initial render */
refreshDashboard();
</script>

</body>
</html>
