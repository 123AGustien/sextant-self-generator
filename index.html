<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Control Room v2 — Boot System</title>

<style>
body{
    background:#0b0f14;
    color:#00ff88;
    font-family:monospace;
    padding:20px;
    margin:0;
}

h1,h2{
    margin:5px 0;
}

.section{
    border:1px solid #00ff88;
    padding:15px;
    margin-bottom:15px;
}

a, button{
    display:block;
    width:100%;
    margin:8px 0;
    padding:12px;
    background:#0b0f14;
    color:#00ff88;
    border:1px solid #00ff88;
    text-decoration:none;
    cursor:pointer;
    font-size:14px;
}

button:hover, a:hover{
    background:#00ff88;
    color:#0b0f14;
}

#status{
    padding:10px;
    margin-top:10px;
    border:1px solid #00ff88;
}

pre{
    background:#05080c;
    padding:10px;
    border:1px solid #00ff88;
    overflow:auto;
    min-height:120px;
}

/* MOBILE FIX */
@media(max-width:600px){
    body{padding:10px;}
}
</style>
</head>

<body>

<h1>⚡ SEXTANT SYSTEM</h1>
<h2>CONTROL ROOM — BOOT SEQUENCE</h2>

<!-- NAVIGATION -->
<div class="section">
    <h2>Navigation Layer</h2>

    <a href="landing.html">📘 Product Overview</a>
    <a href="simulation_screen_v1.html">⚡ Simulator v6.2</a>
    <a href="scenario-router.html">🧭 Scenario Router</a>
    <a href="sextant-offline-command-center/">🛰 Operations Console</a>

    <!-- ✅ FIX: SELF TEST ROUTE -->
    <a href="self-test.html">🧪 Self Test Control Room</a>
</div>

<!-- BOOT CONTROL -->
<div class="section">
    <h2>Boot Control Layer</h2>

    <button onclick="runSelfTest()">RUN SELF TEST (INLINE)</button>

    <button onclick="location.href='self-test.html'">
        OPEN FULL SELF TEST SCREEN
    </button>

    <div id="status">Status: INITIALIZING...</div>

    <pre id="output">Waiting for boot sequence...</pre>
</div>

<script>
function runSelfTest(){

    setStatus("SELF TEST RUNNING");

    const system = {
        engine: "LOADED",
        eventBus: "LOADED",
        cascade: "LOADED",
        risk: "LOADED",
        scenario: "LOADED",
        bootSequence: "OK"
    };

    document.getElementById("output").innerText =
        JSON.stringify(system, null, 2);

    setStatus("SELF TEST PASSED → SYSTEM ONLINE");
}

function setStatus(text){
    document.getElementById("status").innerText = "Status: " + text;
}

window.onload = function(){

    setStatus("BOOT SEQUENCE STARTING");

    setTimeout(() => {
        runSelfTest();
    }, 1200);
};
</script>

</body>
</html>
