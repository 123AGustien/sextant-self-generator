<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Simulator v6 – Unified System Engine</title>

<style>
body{
    background:#0b0f14;
    color:#00ff88;
    font-family:monospace;
    padding:20px;
}

.panel{
    border:1px solid #00ff88;
    padding:12px;
    margin-bottom:12px;
}

button{
    background:#0b0f14;
    color:#00ff88;
    border:1px solid #00ff88;
    padding:10px;
    margin:5px;
    cursor:pointer;
}

button:hover{
    background:#00ff88;
    color:#0b0f14;
}

pre{
    background:#05080c;
    border:1px solid #00ff88;
    padding:12px;
    min-height:120px;
    overflow:auto;
}
</style>
</head>

<body>

<h1>⚡ Sextant Simulator v6 – Unified Cascade System</h1>

<!-- UNIFIED NAVIGATION -->
<div class="panel">
    <h2>SEXTANT SYSTEM NAVIGATION</h2>

    <button onclick="openModule('generator')">Self Generator</button>
    <button onclick="openModule('simulator')">Simulator</button>
    <button onclick="openModule('intervention')">Intervention Lab</button>
    <button onclick="openModule('console')">Operations Console</button>
</div>

<!-- SCENARIOS -->
<div class="panel">
    <h3>SCENARIO CONTROL</h3>

    <button onclick="runScenario('trade')">US–China Trade Escalation</button>
    <button onclick="runScenario('taiwan')">Taiwan Strait Crisis</button>
    <button onclick="runScenario('energy')">Energy Shock</button>
    <button onclick="runScenario('recession')">Global Recession</button>
</div>

<!-- CASCADE OUTPUT -->
<div class="panel">
    <h3>CASCADE EXECUTION</h3>
    <pre id="output">Awaiting scenario...</pre>
</div>

<!-- RISK -->
<div class="panel">
    <h3>RISK ENGINE</h3>
    <pre id="risk">0</pre>
</div>

<!-- INTERVENTION -->
<div class="panel">
    <h3>INTERVENTION CONTROL</h3>

    <button onclick="setIntervention('liquidity')">Liquidity Buffer</button>
    <button onclick="setIntervention('central')">Central Bank Injection</button>
    <button onclick="setIntervention('communication')">Communication Stabilization</button>

    <pre id="log">No intervention active</pre>
</div>

<!-- IO PANEL -->
<div class="panel">
    <h3>SIMULATOR IO PANEL</h3>
    <pre id="io">STATUS: idle</pre>
</div>

<!-- TIMELINE -->
<div class="panel">
    <h3>CASCADE TIMELINE LOG</h3>
    <pre id="timeline">Empty</pre>
</div>

<script>

/* -------------------------
   STATE ENGINE
-------------------------*/

let system = {
    scenario: null,
    step: 0,
    risk: 0,
    intervention: null,
    timeline: []
};

let timer = null;

/* -------------------------
   NAVIGATION ENGINE
-------------------------*/

function openModule(name){

    const output = document.getElementById("output");

    const modules = {
        generator: "SELF GENERATOR → Scenario creation layer active",
        simulator: "SIMULATOR → Cascade execution engine active",
        intervention: "INTERVENTION LAB → Testing interruption strategies",
        console: "OPERATIONS CONSOLE → Visualization layer active"
    };

    output.textContent = modules[name] || "MODULE NOT FOUND";
}

/* -------------------------
   SCENARIOS
-------------------------*/

function runScenario(type){

    const scenarios = {
        trade:{
            name:"US–China Trade Escalation",
            path:["FX Shock","Liquidity Stress","Confidence Loss"],
            base:75
        },

        taiwan:{
            name:"Taiwan Strait Crisis",
            path:["Geopolitical Shock","Market Volatility","Capital Flight"],
            base:95
        },

        energy:{
            name:"Energy Shock",
            path:["Oil Spike","Inflation Pressure","Liquidity Tightening"],
            base:80
        },

        recession:{
            name:"Global Recession",
            path:["Demand Collapse","Credit Stress","Unemployment Rise"],
            base:85
        }
    };

    system.scenario = scenarios[type];
    system.step = 0;
    system.risk = system.scenario.base;
    system.timeline = [];
    system.intervention = null;

    log("SCENARIO_INIT", system.scenario.name);

    startCascade();
    update();
}

/* -------------------------
   CASCADE ENGINE
-------------------------*/

function startCascade(){

    clearInterval(timer);

    timer = setInterval(() => {

        if(!system.scenario) return;

        if(system.step >= system.scenario.path.length){
            log("CASCADE_COMPLETE", "finished");
            clearInterval(timer);
            update();
            return;
        }

        let node = system.scenario.path[system.step];

        log("CASCADE_STEP", node);

        system.risk += 8;

        // INTERVENTION RULES
        if(system.intervention === "liquidity" && system.step >= 1){
            system.risk -= 25;
            log("INTERVENTION_TRIGGERED", "Liquidity Buffer stops cascade");
            clearInterval(timer);
        }

        if(system.intervention === "central" && system.step >= 2){
            system.risk -= 35;
            log("INTERVENTION_TRIGGERED", "Central Bank stabilizes system");
            clearInterval(timer);
        }

        system.step++;

        update();

    }, 1000);
}

/* -------------------------
   INTERVENTIONS
-------------------------*/

function setIntervention(type){

    system.intervention = type;

    log("INTERVENTION_SET", type);

    document.getElementById("log").textContent =
        "ACTIVE: " + type;
}

/* -------------------------
   LOGGING ENGINE
-------------------------*/

function log(type, data){

    system.timeline.push({
        time: new Date().toISOString(),
        type,
        data
    });

    update();
}

/* -------------------------
   RENDER ENGINE
-------------------------*/

function update(){

    document.getElementById("risk").textContent =
        system.risk;

    document.getElementById("output").textContent =
        system.scenario
        ? system.scenario.path.slice(0, system.step).map(x => "→ " + x).join("\n")
        : "No scenario";

    document.getElementById("timeline").textContent =
        system.timeline.map(t =>
            `[${t.time}] ${t.type} → ${t.data}`
        ).join("\n");

    document.getElementById("io").textContent =
`STATUS: running
SCENARIO: ${system.scenario?.name || "none"}
STEP: ${system.step}
RISK: ${system.risk}
INTERVENTION: ${system.intervention || "none"}
TIMELINE EVENTS: ${system.timeline.length}`;
}

/* INIT */
update();

</script>

</body>
</html>
