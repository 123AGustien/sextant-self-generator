<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Simulator v6 – Real-Time Resilience Dashboard</title>

<style>
body{
    background:#0b0f14;
    color:#00ff88;
    font-family:monospace;
    padding:20px;
}

.panel{
    border:1px solid #00ff88;
    padding:12px;
    margin-bottom:12px;
}

button{
    background:#0b0f14;
    color:#00ff88;
    border:1px solid #00ff88;
    padding:10px;
    margin:5px;
    cursor:pointer;
}

button:hover{
    background:#00ff88;
    color:#0b0f14;
}

pre{
    background:#05080c;
    border:1px solid #00ff88;
    padding:12px;
    min-height:120px;
    overflow:auto;
}
</style>
</head>

<body>

<h1>⚡ Sextant Simulator v6 – Real-Time Resilience Dashboard</h1>

<!-- CASCADES -->
<div class="panel">
    <h3>CASCADE INPUT LAYER</h3>

    <button onclick="addCascade('FX Shock')">FX Shock</button>
    <button onclick="addCascade('Credit Stress')">Credit Stress</button>
    <button onclick="addCascade('Geopolitical Shock')">Geopolitical Shock</button>
    <button onclick="addCascade('Energy Shock')">Energy Shock</button>

    <button onclick="clearSystem()">Reset System</button>
</div>

<!-- DASHBOARD -->
<div class="panel">
    <h3>LIVE RESILIENCE DASHBOARD</h3>
    <pre id="dashboard">Initializing system...</pre>
</div>

<!-- RISK -->
<div class="panel">
    <h3>SYSTEM RISK ENGINE</h3>
    <pre id="risk">0</pre>
</div>

<!-- INTERVENTION -->
<div class="panel">
    <h3>INTERVENTION CONTROL</h3>

    <button onclick="intervene('liquidity')">Liquidity Buffer</button>
    <button onclick="intervene('central')">Central Bank Injection</button>
    <button onclick="intervene('communication')">Communication Stabilization</button>

    <pre id="log">No intervention active</pre>
</div>

<script>

/* ---------------------------
   STATE ENGINE
----------------------------*/

let system = {
    cascades: [],
    risk: 0,
    stability: 100,
    interventionPower: 1
};

/* ---------------------------
   ADD CASCADES
----------------------------*/

function addCascade(name){

    system.cascades.push(name);

    system.risk += 20;

    updateDashboard();
}

/* ---------------------------
   INTERVENTIONS
----------------------------*/

function intervene(type){

    const log = document.getElementById("log");

    if(type === "liquidity"){
        system.interventionPower = 1.2;
        log.textContent = "Liquidity Buffer Active";
    }

    if(type === "central"){
        system.interventionPower = 1.8;
        log.textContent = "Central Bank Injection Active";
    }

    if(type === "communication"){
        system.interventionPower = 1.4;
        log.textContent = "Communication Stabilization Active";
    }

    updateDashboard();
}

/* ---------------------------
   SYSTEM ENGINE LOOP
----------------------------*/

function updateDashboard(){

    let riskBase = system.cascades.length * 20;

    let interactionBoost =
        system.cascades.length > 1
        ? system.cascades.length * 8
        : 0;

    system.risk = riskBase + interactionBoost;

    system.risk = Math.max(
        0,
        system.risk - (system.interventionPower * 15)
    );

    system.stability = Math.max(
        0,
        100 - system.risk
    );

    render();
}

/* ---------------------------
   RENDER DASHBOARD
----------------------------*/

function render(){

    const dashboard = document.getElementById("dashboard");
    const risk = document.getElementById("risk");

    dashboard.textContent =
`ACTIVE CASCADES:
${system.cascades.map(c => "→ " + c).join("\n") || "None"}

SYSTEM STATUS:
Risk Level: ${system.risk}
Stability: ${system.stability}%

INTERVENTION POWER:
${system.interventionPower}

HEAT LEVEL:
${system.risk > 80 ? "🔥 CRITICAL"
: system.risk > 50 ? "⚠ HIGH"
: system.risk > 20 ? "🟡 MODERATE"
: "🟢 STABLE"}`;

    risk.textContent =
        "Risk Index: " + system.risk;
}

/* ---------------------------
   RESET
----------------------------*/

function clearSystem(){

    system = {
        cascades: [],
        risk: 0,
        stability: 100,
        interventionPower: 1
    };

    document.getElementById("log").textContent =
        "No intervention active";

    updateDashboard();
}

/* INITIAL RENDER */
updateDashboard();

</script>

</body>
</html>
