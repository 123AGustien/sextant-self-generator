<script>
document.addEventListener("DOMContentLoaded", () => {

    const output = document.getElementById("output");
    const risk = document.getElementById("risk");

    // =========================
    // BANK RUN
    // =========================
    document.getElementById("runBankRun")?.addEventListener("click", () => {

        if (typeof window.runBankRunV1 !== "function") {
            output.textContent = "runBankRunV1 missing";
            risk.textContent = "Risk Index: ERROR";
            return;
        }

        const result = window.runBankRunV1();

        output.textContent =
            JSON.stringify(result, null, 2);

        risk.textContent =
            "Risk Index: HIGH (Bank Run)";
    });

    // =========================
    // CONTAGION
    // =========================
    document.getElementById("runSimulation")?.addEventListener("click", () => {

        if (typeof window.runContagionV1 !== "function") {
            output.textContent = "runContagionV1 missing";
            risk.textContent = "Risk Index: ERROR";
            return;
        }

        const result = window.runContagionV1();

        output.textContent =
            JSON.stringify(result, null, 2);

        risk.textContent =
            "Risk Index: CRITICAL (Contagion)";
    });

    // =========================
    // CENTRAL BANK
    // =========================
    document.getElementById("runCentralBank")?.addEventListener("click", () => {

        if (typeof window.runCentralBankIntervention !== "function") {
            output.textContent =
                "runCentralBankIntervention missing";

            risk.textContent =
                "Risk Index: ERROR";

            return;
        }

        const result =
            window.runCentralBankIntervention({
                entities: {}
            });

        output.textContent =
            JSON.stringify(result, null, 2);

        risk.textContent =
            "Risk Index: STABILIZATION";
    });

});
</script>

<script type="module" src="reprisory-bankrun-v1.js"></script>
<script type="module" src="reprisory-contagion-v1.js"></script>
<script type="module" src="reprisory-centralbank-v2.js"></script>
