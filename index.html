<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Unified Strategic Command Center v2</title>

<style>
body{
    background:#0b0f14;
    color:#00ff88;
    font-family:monospace;
    padding:20px;
}

.panel{
    border:1px solid #00ff88;
    padding:12px;
    margin-bottom:12px;
}

button{
    background:#0b0f14;
    color:#00ff88;
    border:1px solid #00ff88;
    padding:10px;
    margin:5px;
    cursor:pointer;
}

button:hover{
    background:#00ff88;
    color:#0b0f14;
}

pre{
    background:#05080c;
    border:1px solid #00ff88;
    padding:12px;
    min-height:140px;
    overflow:auto;
}
</style>
</head>

<body>

<h1>⚡ Sextant Unified Strategic Command Center v2</h1>

<!-- SCENARIOS -->
<div class="panel">
    <h3>SCENARIO CONTROL</h3>

    <button onclick="runScenario('trade')">US–China Trade Escalation</button>
    <button onclick="runScenario('taiwan')">Taiwan Strait Crisis</button>
    <button onclick="runScenario('energy')">Energy Shock</button>
    <button onclick="runScenario('recession')">Global Recession</button>
</div>

<!-- SIMULATION -->
<div class="panel">
    <h3>SIMULATION ENGINE</h3>
    <pre id="output">Awaiting execution...</pre>
</div>

<!-- RISK -->
<div class="panel">
    <h3>RISK DASHBOARD</h3>
    <pre id="risk">Risk Index: --</pre>
</div>

<!-- INTERVENTION -->
<div class="panel">
    <h3>INTERVENTION LAYER</h3>

    <button onclick="applyIntervention('liquidity')">Liquidity Buffer</button>
    <button onclick="applyIntervention('central')">Central Bank Injection</button>
    <button onclick="applyIntervention('communication')">Communication Stabilization</button>

    <pre id="log">No intervention applied</pre>
</div>

<script>

let currentRisk = 0;
let activeScenario = null;

/* ---------------------------
   SCENARIO ENGINE
----------------------------*/

function runScenario(type){

    const output = document.getElementById("output");
    const risk = document.getElementById("risk");

    const scenarios = {
        trade:{
            name:"US–China Trade Escalation",
            path:["FX Shock","Liquidity Stress","Confidence Loss"],
            baseRisk:75
        },

        taiwan:{
            name:"Taiwan Strait Crisis",
            path:["Geopolitical Shock","Market Volatility","Capital Flight"],
            baseRisk:95
        },

        energy:{
            name:"Energy Shock",
            path:["Oil Spike","Inflation Pressure","Liquidity Tightening"],
            baseRisk:80
        },

        recession:{
            name:"Global Recession",
            path:["Demand Collapse","Credit Stress","Unemployment Rise"],
            baseRisk:85
        }
    };

    activeScenario = scenarios[type];

    currentRisk = activeScenario.baseRisk;

    output.textContent = JSON.stringify({
        scenario: activeScenario.name,
        cascade: activeScenario.path,
        state:"RUNNING"
    }, null, 2);

    risk.textContent = "Risk Index: " + currentRisk;
}

/* ---------------------------
   INTERVENTIONS
----------------------------*/

function applyIntervention(type){

    const log = document.getElementById("log");
    const risk = document.getElementById("risk");

    let reduction = 0;
    let label = "";

    if(type === "liquidity"){
        reduction = 20;
        label = "Liquidity Buffer Activated";
    }

    if(type === "central"){
        reduction = 35;
        label = "Central Bank Injection Activated";
    }

    if(type === "communication"){
        reduction = 15;
        label = "Communication Stabilization Activated";
    }

    currentRisk = Math.max(0, currentRisk - reduction);

    risk.textContent = "Risk Index: " + currentRisk;

    log.textContent =
        label + "\nNew Risk Level: " + currentRisk;
}

</script>

</body>
</html>
