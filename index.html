<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Control Entry Gateway</title>

<style>
body{
    background:#0b0f14;
    color:#00ff88;
    font-family:monospace;
    padding:30px;
}

.section{
    border:1px solid #00ff88;
    padding:20px;
    margin-bottom:20px;
}

a, button{
    display:block;
    margin:10px 0;
    padding:12px;
    color:#00ff88;
    background:#0b0f14;
    border:1px solid #00ff88;
    text-decoration:none;
    cursor:pointer;
}

button:hover, a:hover{
    background:#00ff88;
    color:#0b0f14;
}
</style>
</head>

<body>

<h1>⚡ SEXTANT SYSTEM</h1>
<h2>Control Entry Gateway</h2>

<div class="section">
    <h2>Navigation</h2>

    <a href="landing.html">📘 Product Overview</a>
    <a href="simulation_screen_v1.html">⚡ Simulator v6.2</a>
    <a href="scenario-router.html">🧭 Scenario Router</a>
    <a href="sextant-offline-command-center/">🛰 Operations Console</a>
</div>

<div class="section">
    <h2>System Boot Control</h2>

    <button onclick="runSelfTest()">RUN SELF TEST</button>

    <div id="status">Status: Idle</div>
    <pre id="output"></pre>
</div>

<script>
function runSelfTest(){

    document.getElementById("status").innerText =
        "Status: SELF TEST RUNNING";

    const test = {
        engine: "OK",
        eventBus: "OK",
        cascade: "OK",
        risk: "OK",
        scenario: "OK"
    };

    document.getElementById("output").innerText =
        JSON.stringify(test, null, 2);

    document.getElementById("status").innerText =
        "Status: SELF TEST PASSED";
}
</script>

</body>
</html>
