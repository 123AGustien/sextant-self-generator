<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant State-Aware Master Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: #2bd4ff;
    text-align: center;
}

h1 {
    margin-top: 20px;
    font-size: 22px;
}

button {
    width: 90%;
    max-width: 400px;
    padding: 15px;
    margin: 10px;
    background: #111826;
    color: #2bd4ff;
    border: 1px solid #2bd4ff;
    font-size: 16px;
    cursor: pointer;
    border-radius: 6px;
}

button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

.status {
    margin-top: 15px;
    font-size: 16px;
    font-weight: bold;
}

.note {
    font-size: 12px;
    color: #7aa2b7;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>SEXTANT MASTER CONSOLE</h1>

<div id="systemState" class="status">🟢 STABLE</div>

<button id="btnSim" onclick="go('sim')">Run Simulation Screen v2</button>
<button id="btnInd" onclick="go('ind')">Industrial Control Screen v1</button>
<button id="btnPilot" onclick="go('pilot')">Schneider Datacentre Pilot</button>

<div class="note">State-Aware Navigation Layer • Contingency Controlled Access</div>

<script>

/* =========================
   BASE URL
========================= */
const BASE = "https://123agustien.github.io/sextant-resilience-operations-console/";

/* =========================
   ROUTES
========================= */
const routes = {
    sim: "simulation_screen_v2.html",
    ind: "industrial_control_screen_v1.html",
    pilot: "schneider_datacentre_pilot.html"
};

/* =========================
   SYSTEM STATE (SIMULATION INPUT)
   change this later from Risk Graph
========================= */
let systemState = "stable"; 
// stable | warning | crisis

/* =========================
   STATE CONTROLS ACCESS
========================= */
function applyStateRules() {

    const btnSim = document.getElementById("btnSim");
    const btnInd = document.getElementById("btnInd");
    const btnPilot = document.getElementById("btnPilot");
    const stateBox = document.getElementById("systemState");

    if (systemState === "stable") {
        stateBox.innerText = "🟢 STABLE";

        btnSim.disabled = false;
        btnInd.disabled = false;
        btnPilot.disabled = false;
    }

    if (systemState === "warning") {
        stateBox.innerText = "🟠 WARNING";

        btnSim.disabled = false;
        btnInd.disabled = false;
        btnPilot.disabled = true; // restrict pilot
    }

    if (systemState === "crisis") {
        stateBox.innerText = "🔴 CRISIS";

        btnSim.disabled = false;
        btnInd.disabled = true;
        btnPilot.disabled = true;
    }
}

/* =========================
   SAFE ROUTER
========================= */
function go(screen) {

    const file = routes[screen];
    const url = BASE + file;

    fetch(url, { method: "HEAD" })
        .then(res => {

            if (res.ok) {
                window.location.href = url;
            } else {
                alert("Screen not found: " + file);
            }

        })
        .catch(() => {
            alert("Network error or file missing");
        });
}

/* =========================
   DEMO STATE SWITCH (for testing)
   REMOVE LATER OR CONNECT TO RISK GRAPH
========================= */
setTimeout(() => {
    systemState = "warning";
    applyStateRules();
}, 2000);

setTimeout(() => {
    systemState = "crisis";
    applyStateRules();
}, 5000);

/* =========================
   INIT
========================= */
applyStateRules();

</script>

</body>
</html>
