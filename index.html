<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sextant Unified Strategic Command Center</title>

    <style>
        body {
            background: #0b0f14;
            color: #00ff88;
            font-family: monospace;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .panel {
            border: 1px solid #00ff88;
            padding: 12px;
            margin-bottom: 12px;
        }

        button {
            background: #0b0f14;
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #00ff88;
            color: #0b0f14;
        }

        pre {
            background: #05080c;
            padding: 12px;
            min-height: 160px;
            overflow: auto;
            border: 1px solid #00ff88;
        }
    </style>
</head>

<body>

<h1>⚡ Sextant Unified Strategic Command Center</h1>

<div class="panel">
    <button onclick="runSystem()">▶ Run Generator</button>
    <button onclick="runSimulation()">🧠 Run Failure Simulation</button>
</div>

<div class="panel">
    <div>EXECUTION OUTPUT</div>
    <pre id="output">Awaiting execution...</pre>
</div>

<div class="panel">
    <div>RISK DASHBOARD</div>
    <pre id="risk">Risk Index: --</pre>
</div>

<script src="engine.js"></script>
<script src="command_bridge.js"></script>

</body>
</html>
