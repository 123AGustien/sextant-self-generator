<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Dashboard v6.2 – Cascade Timeline Logging</title>

<style>
body{
    background:#0b0f14;
    color:#00ff88;
    font-family:monospace;
    padding:20px;
}

.panel{
    border:1px solid #00ff88;
    padding:12px;
    margin-bottom:12px;
}

button{
    background:#0b0f14;
    color:#00ff88;
    border:1px solid #00ff88;
    padding:10px;
    margin:5px;
    cursor:pointer;
}

button.active{
    background:#00ff88;
    color:#0b0f14;
}

pre{
    background:#05080c;
    border:1px solid #00ff88;
    padding:12px;
    min-height:120px;
    overflow:auto;
}
</style>
</head>

<body>

<h1>⚡ Sextant Dashboard v6.2 – Cascade Timeline Engine</h1>

<!-- CASCADES -->
<div class="panel">
    <h3>CASCADE CONTROL</h3>

    <button onclick="toggleCascade('FX Shock')">FX Shock</button>
    <button onclick="toggleCascade('Credit Stress')">Credit Stress</button>
    <button onclick="toggleCascade('Geopolitical Shock')">Geopolitical Shock</button>
    <button onclick="toggleCascade('Energy Shock')">Energy Shock</button>

    <button onclick="resetSystem()">Reset</button>
</div>

<!-- INTERVENTIONS -->
<div class="panel">
    <h3>INTERVENTION CONTROL</h3>

    <button onclick="setIntervention('liquidity', this)">Liquidity Buffer</button>
    <button onclick="setIntervention('central', this)">Central Bank Injection</button>
    <button onclick="setIntervention('communication', this)">Communication Stabilization</button>
</div>

<!-- SYSTEM OUTPUT -->
<div class="panel">
    <h3>LIVE SYSTEM DASHBOARD</h3>
    <pre id="dashboard"></pre>
</div>

<!-- RISK -->
<div class="panel">
    <h3>RISK ENGINE</h3>
    <pre id="risk"></pre>
</div>

<!-- 🧠 NEW: TIMELINE -->
<div class="panel">
    <h3>CASCADE TIMELINE LOG</h3>
    <pre id="timeline">No events yet</pre>
</div>

<script>

/* -------------------------
   STATE
-------------------------*/

let system = {
    cascades: [],
    risk: 0,
    intervention: null,
    interventionPower: 1,
    timeline: []
};

/* -------------------------
   LOG ENGINE
-------------------------*/

function logEvent(type, data){

    system.timeline.push({
        time: new Date().toISOString(),
        type,
        data
    });
}

/* -------------------------
   CASCADES
-------------------------*/

function toggleCascade(name){

    const index = system.cascades.indexOf(name);

    if(index === -1){
        system.cascades.push(name);
        logEvent("CASCADE_ADDED", name);
    } else {
        system.cascades.splice(index, 1);
        logEvent("CASCADE_REMOVED", name);
    }

    updateSystem();
}

/* -------------------------
   INTERVENTION
-------------------------*/

function setIntervention(type, btn){

    system.intervention = type;

    system.interventionPower =
        type === "central" ? 1.8 :
        type === "communication" ? 1.4 :
        1.2;

    logEvent("INTERVENTION_SET", type);

    document.querySelectorAll("button")
        .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");

    updateSystem();
}

/* -------------------------
   ENGINE
-------------------------*/

function updateSystem(){

    let base = system.cascades.length * 20;

    let interaction =
        system.cascades.length > 1
        ? system.cascades.length * 10
        : 0;

    system.risk = base + interaction;

    system.risk = Math.max(
        0,
        system.risk - (system.interventionPower * 18)
    );

    logEvent("RISK_UPDATE", system.risk);

    render();
}

/* -------------------------
   RENDER
-------------------------*/

function render(){

    const stability = Math.max(0, 100 - system.risk);

    document.getElementById("dashboard").textContent =
`CASCADE STATE:
${system.cascades.length ? system.cascades.map(c => "→ " + c).join("\n") : "None"}

INTERVENTION:
${system.intervention || "None"}

STABILITY:
${stability.toFixed(1)}%

STATUS:
${system.risk > 80 ? "CRITICAL"
: system.risk > 50 ? "HIGH"
: system.risk > 20 ? "MODERATE"
: "STABLE"}`;

    document.getElementById("risk").textContent =
        "Risk Index: " + system.risk;

    document.getElementById("timeline").textContent =
        system.timeline.map(e =>
            `[${e.time}] ${e.type} → ${JSON.stringify(e.data)}`
        ).join("\n");
}

/* -------------------------
   RESET
-------------------------*/

function resetSystem(){

    system = {
        cascades: [],
        risk: 0,
        intervention: null,
        interventionPower: 1,
        timeline: []
    };

    document.querySelectorAll("button")
        .forEach(b => b.classList.remove("active"));

    logEvent("SYSTEM_RESET", true);

    updateSystem();
}

/* INIT */
updateSystem();

</script>

</body>
</html>
