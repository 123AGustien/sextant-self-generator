<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Simulator v4 – Intervention Interruption Engine</title>

<style>
body{
    background:#0b0f14;
    color:#00ff88;
    font-family:monospace;
    padding:20px;
}

.panel{
    border:1px solid #00ff88;
    padding:12px;
    margin-bottom:12px;
}

button{
    background:#0b0f14;
    color:#00ff88;
    border:1px solid #00ff88;
    padding:10px;
    margin:5px;
    cursor:pointer;
}

button:hover{
    background:#00ff88;
    color:#0b0f14;
}

pre{
    background:#05080c;
    border:1px solid #00ff88;
    padding:12px;
    min-height:140px;
    overflow:auto;
}
</style>
</head>

<body>

<h1>⚡ Sextant Simulator v4 – Intervention Interruption Engine</h1>

<!-- SCENARIOS -->
<div class="panel">
    <h3>SCENARIO CONTROL</h3>

    <button onclick="runScenario('trade')">US–China Trade Escalation</button>
    <button onclick="runScenario('taiwan')">Taiwan Strait Crisis</button>
    <button onclick="runScenario('energy')">Energy Shock</button>
    <button onclick="runScenario('recession')">Global Recession</button>
</div>

<!-- OUTPUT -->
<div class="panel">
    <h3>CASCADE ENGINE</h3>
    <pre id="output">Awaiting execution...</pre>
</div>

<!-- RISK -->
<div class="panel">
    <h3>RISK ENGINE</h3>
    <pre id="risk">Risk Index: --</pre>
</div>

<!-- INTERVENTION -->
<div class="panel">
    <h3>INTERVENTION CONTROL</h3>

    <button onclick="applyIntervention('liquidity')">Liquidity Buffer</button>
    <button onclick="applyIntervention('central')">Central Bank Injection</button>
    <button onclick="applyIntervention('communication')">Communication Stabilization</button>

    <pre id="log">No intervention applied</pre>
</div>

<script>

let currentRisk = 0;
let activeScenario = null;
let stepIndex = 0;
let cascadeTimer = null;
let interventionActive = null;

/* ---------------------------
   SCENARIOS
----------------------------*/

function runScenario(type){

    const scenarios = {
        trade:{
            name:"US–China Trade Escalation",
            path:["FX Shock","Liquidity Stress","Confidence Loss"],
            baseRisk:75
        },

        taiwan:{
            name:"Taiwan Strait Crisis",
            path:["Geopolitical Shock","Market Volatility","Capital Flight"],
            baseRisk:95
        },

        energy:{
            name:"Energy Shock",
            path:["Oil Spike","Inflation Pressure","Liquidity Tightening"],
            baseRisk:80
        },

        recession:{
            name:"Global Recession",
            path:["Demand Collapse","Credit Stress","Unemployment Rise"],
            baseRisk:85
        }
    };

    activeScenario = scenarios[type];
    currentRisk = activeScenario.baseRisk;
    stepIndex = 0;
    interventionActive = null;

    document.getElementById("output").textContent =
        "INITIATING CASCADE...\n";

    document.getElementById("risk").textContent =
        "Risk Index: " + currentRisk;

    startCascade();
}

/* ---------------------------
   CASCADE ENGINE (INTERRUPTABLE)
----------------------------*/

function startCascade(){

    if(!activeScenario) return;

    const output = document.getElementById("output");

    clearInterval(cascadeTimer);

    cascadeTimer = setInterval(() => {

        // IF INTERVENTION SUCCESSFULLY STOPS SYSTEM
        if(interventionActive === "liquidity" && stepIndex >= 1){
            output.textContent += "\n🛑 CASCADE INTERRUPTED BY LIQUIDITY BUFFER";
            clearInterval(cascadeTimer);
            return;
        }

        if(interventionActive === "central" && stepIndex >= 2){
            output.textContent += "\n🛑 CASCADE STABILIZED BY CENTRAL BANK ACTION";
            clearInterval(cascadeTimer);
            return;
        }

        if(stepIndex >= activeScenario.path.length){
            output.textContent += "\n✔ CASCADE COMPLETED";
            clearInterval(cascadeTimer);
            return;
        }

        let node = activeScenario.path[stepIndex];

        output.textContent += "→ " + node + "\n";

        currentRisk += 5;

        document.getElementById("risk").textContent =
            "Risk Index: " + currentRisk;

        stepIndex++;

    }, 1200);
}

/* ---------------------------
   INTERVENTIONS
----------------------------*/

function applyIntervention(type){

    const log = document.getElementById("log");

    interventionActive = type;

    let label = "";

    if(type === "liquidity"){
        label = "Liquidity Buffer Activated (Early Interruption Capability)";
    }

    if(type === "central"){
        label = "Central Bank Injection Activated (Mid-Cascade Stabilizer)";
    }

    if(type === "communication"){
        label = "Communication Stabilization Activated (Soft Containment)";
    }

    log.textContent =
        label +
        "\nSystem Status: Intervention Active" +
        "\nCascade Response: Pending";

}

</script>

</body>
</html>
