<script>
function explainCascade(cascade) {

    const path = cascade.path || "unknown";
    const stress = cascade.stress || 0;

    let severity = "low";
    if (stress > 0.8) severity = "critical";
    else if (stress > 0.6) severity = "high";
    else if (stress > 0.4) severity = "moderate";

    let driver = "multi-factor stress";

    if (path.includes("FX")) driver = "currency instability";
    if (path.includes("Liquidity")) driver = "liquidity contraction";
    if (path.includes("Bank")) driver = "banking system stress";

    return `
CASCADE ANALYSIS
Primary Path: ${path}
Primary Driver: ${driver}
Severity: ${severity}

SYSTEM INTERPRETATION:
The system is experiencing ${driver}.
Stress propagation indicates a ${severity} regime.
Intervention should focus on stabilising the primary driver.
`;
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Simulator v6.2 – Unified Cascade Engine</title>

<style>
body{
    background:#0b0f14;
    color:#00ff88;
    font-family:monospace;
    padding:20px;
}

.panel{
    border:1px solid #00ff88;
    padding:12px;
    margin-bottom:12px;
}

button{
    background:#0b0f14;
    color:#00ff88;
    border:1px solid #00ff88;
    padding:10px;
    margin:5px;
    cursor:pointer;
}

button.active{
    background:#00ff88;
    color:#0b0f14;
}

pre{
    background:#05080c;
    border:1px solid #00ff88;
    padding:12px;
    min-height:120px;
    overflow:auto;
}
</style>
</head>

<body>

<h1>⚡ Sextant Simulator v6.2 – Unified Cascade Engine</h1>

<!-- NAVIGATION -->
<div class="panel">
    <h3>NAVIGATION</h3>
    <button onclick="openModule('generator')">Self Generator</button>
    <button onclick="openModule('simulator')">Simulator</button>
    <button onclick="openModule('intervention')">Intervention Lab</button>
    <button onclick="openModule('console')">Console</button>
</div>

<!-- SCENARIOS -->
<div class="panel">
    <h3>SCENARIO CONTROL</h3>
    <button onclick="runScenario('trade')">US–China Trade</button>
    <button onclick="runScenario('taiwan')">Taiwan Crisis</button>
    <button onclick="runScenario('energy')">Energy Shock</button>
    <button onclick="runScenario('recession')">Global Recession</button>
</div>

<!-- OUTPUT -->
<div class="panel">
    <h3>CASCADE ENGINE</h3>
    <pre id="output">Idle...</pre>
</div>

<!-- RISK -->
<div class="panel">
    <h3>RISK ENGINE</h3>
    <pre id="risk">0</pre>
</div>

<!-- INTERVENTION -->
<div class="panel">
    <h3>INTERVENTION</h3>
    <button onclick="setIntervention('liquidity')">Liquidity</button>
    <button onclick="setIntervention('central')">Central Bank</button>
    <button onclick="setIntervention('communication')">Communication</button>
    <pre id="log">None</pre>
</div>

<!-- TIMELINE -->
<div class="panel">
    <h3>TIMELINE</h3>
    <pre id="timeline">Empty</pre>
</div>

<script>

/* =========================
   SINGLE STATE ENGINE
=========================*/
let system = {
    scenario: null,
    step: 0,
    risk: 0,
    intervention: null,
    timeline: []
};

let timer = null;

/* =========================
   NAVIGATION
=========================*/
function openModule(name){
    document.getElementById("output").textContent =
        "MODULE → " + name;
}

/* =========================
   SCENARIOS
=========================*/
function runScenario(type){

    const scenarios = {
        trade:{
            name:"US–China Trade Escalation",
            path:["FX Shock","Liquidity Stress","Confidence Loss"],
            base:75
        },
        taiwan:{
            name:"Taiwan Strait Crisis",
            path:["Geopolitical Shock","Market Volatility","Capital Flight"],
            base:95
        },
        energy:{
            name:"Energy Shock",
            path:["Oil Spike","Inflation Pressure","Liquidity Tightening"],
            base:80
        },
        recession:{
            name:"Global Recession",
            path:["Demand Collapse","Credit Stress","Unemployment Rise"],
            base:85
        }
    };

    system.scenario = scenarios[type];
    system.step = 0;
    system.risk = system.scenario.base;
    system.timeline = [];
    system.intervention = null;

    log("SCENARIO_INIT", system.scenario.name);

    startCascade();
    update();
}

/* =========================
   CASCADE ENGINE
=========================*/
function startCascade(){

    clearInterval(timer);

    timer = setInterval(() => {

        if(!system.scenario) return;

        if(system.step >= system.scenario.path.length){
            log("CASCADE_COMPLETE", "finished");
            clearInterval(timer);
            update();
            return;
        }

        let node = system.scenario.path[system.step];

        log("CASCADE_STEP", node);

        system.risk += 8;

        if(system.intervention === "liquidity" && system.step >= 1){
            system.risk -= 25;
            log("INTERVENTION_TRIGGERED", "Liquidity stops cascade");
            clearInterval(timer);
            update();
            return;
        }

        if(system.intervention === "central" && system.step >= 2){
            system.risk -= 35;
            log("INTERVENTION_TRIGGERED", "Central Bank stabilizes");
            clearInterval(timer);
            update();
            return;
        }

        system.step++;
        update();

    }, 1000);
}

/* =========================
   INTERVENTION
=========================*/
function setIntervention(type){

    system.intervention = type;

    log("INTERVENTION_SET", type);

    document.getElementById("log").textContent =
        "ACTIVE → " + type;
}

/* =========================
   LOGGING
=========================*/
function log(type, data){

    system.timeline.push({
        time: new Date().toISOString(),
        type,
        data
    });

    update();
}

/* =========================
   RENDER
=========================*/
function update(){

    document.getElementById("risk").textContent = system.risk;

    document.getElementById("output").textContent =
        system.scenario
        ? system.scenario.path.slice(0, system.step).map(x => "→ " + x).join("\n")
        : "Idle";

    document.getElementById("timeline").textContent =
        system.timeline.map(t =>
            `[${t.time}] ${t.type} → ${t.data}`
        ).join("\n");
}

/* INIT */
update();

</script>

</body>
</html>
