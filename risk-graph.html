<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sextant Protocol - Risk Graph Module</title>

<style>
body{
    margin:0;
    background:#101820;
    color:#ffffff;
    font-family:Arial,Helvetica,sans-serif;
}

header{
    background:#0d47a1;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.panel{
    background:#1b263b;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
}

.status{
    font-size:26px;
    font-weight:bold;
    color:orange;
}

.graph{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    height:250px;
    border-left:2px solid #ffffff;
    border-bottom:2px solid #ffffff;
    padding:10px;
}

.bar{
    width:40px;
    background:#2196f3;
    text-align:center;
    color:white;
    font-size:12px;
}

.legend{
    margin-top:20px;
}

button{
    padding:10px 18px;
    margin:5px;
    font-size:15px;
    cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>SEXTANT PROTOCOL</h1>
<h2>Risk Graph Module</h2>
</header>

<div class="container">

<div class="panel">
<h2>Current Status</h2>
<div class="status">🟠 WARNING</div>
</div>

<div class="panel">
<h2>Last 10 Simulation Results</h2>

<div class="graph">

<div class="bar" style="height:60px;">1</div>
<div class="bar" style="height:90px;">2</div>
<div class="bar" style="height:120px;">3</div>
<div class="bar" style="height:160px;">4</div>
<div class="bar" style="height:180px;">5</div>
<div class="bar" style="height:140px;">6</div>
<div class="bar" style="height:100px;">7</div>
<div class="bar" style="height:170px;">8</div>
<div class="bar" style="height:210px;">9</div>
<div class="bar" style="height:240px;">10</div>

</div>

<div class="legend">
🔵 Stable &nbsp;&nbsp;
🟠 Warning &nbsp;&nbsp;
🔴 Crisis
</div>

</div>

<div class="panel">

<h2>Simulation Controls</h2>

<button>Run Normal</button>
<button>Cooling Failure</button>
<button>Network Congestion</button>
<button>Power Failure</button>
<button>Blackout</button>

</div>

<div class="panel">

<h2>Live Metrics</h2>

<p>Risk Score : 74</p>
<p>Recovery Index : 58%</p>
<p>Critical Nodes : 3</p>

</div>

</div>

</body>
</html>
